<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - V.S.B. Engineering College</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card animate-fade-in">
            <div class="auth-brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2>V.S.B. Portal</h2>
            </div>
            
            <div class="auth-header">
                <h1>Student Login</h1>
                <p>V.S.B. Engineering College, Karur</p>
            </div>

            {% if error %}
            <div class="auth-alert error-alert animate-fade-in">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            {% if success_msg %}
            <div class="auth-alert success-alert animate-fade-in">
                <i class="fa-solid fa-circle-check"></i>
                <span>{{ success_msg }}</span>
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="student_id">Student ID</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-card input-icon"></i>
                        <input 
                            type="text" 
                            id="student_id" 
                            name="student_id" 
                            placeholder="e.g. S1001" 
                            required 
                            autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••" 
                            required>
                    </div>
                </div>

                <button type="submit" class="auth-submit-btn">
                    <span>Login</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>New student? <a href="{{ url_for('register') }}">Register Portal Account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
