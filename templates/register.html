<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - V.S.B. Engineering College</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card register-card animate-fade-in">
            <div class="auth-brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2>V.S.B. Portal</h2>
            </div>
            
            <div class="auth-header">
                <h1>V.S.B. Engineering College, Karur</h1>
                <p>Register to query tuition fees and payment schedules</p>
            </div>

            {% if error %}
            <div class="auth-alert error-alert animate-fade-in">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="{{ url_for('register') }}" method="POST" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="student_id">Student ID</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-id-card input-icon"></i>
                            <input 
                                type="text" 
                                id="student_id" 
                                name="student_id" 
                                placeholder="e.g. S1001" 
                                required 
                                autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input 
                                type="text" 
                                id="name" 
                                name="name" 
                                placeholder="e.g. John Doe" 
                                required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-graduation-cap input-icon"></i>
                        <select id="department" name="department" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="Artificial Intelligence and Data Science (AI&DS)">Artificial Intelligence and Data Science (AI&DS)</option>
                            <option value="Artificial Intelligence and Machine Learning (AI&ML)">Artificial Intelligence and Machine Learning (AI&ML)</option>
                            <option value="Bio Technology">Bio Technology</option>
                            <option value="Biomedical Engineering">Biomedical Engineering</option>
                            <option value="Chemical Engineering">Chemical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                            <option value="Computer and Communication Engineering (CCE)">Computer and Communication Engineering (CCE)</option>
                            <option value="Computer Science and Engineering (CSE)">Computer Science and Engineering (CSE)</option>
                            <option value="Computer Science and Business Systems (CSBS)">Computer Science and Business Systems (CSBS)</option>
                            <option value="Electrical and Electronics Engineering (EEE)">Electrical and Electronics Engineering (EEE)</option>
                            <option value="Electronics and Communication Engineering (ECE)">Electronics and Communication Engineering (ECE)</option>
                            <option value="Information Technology (IT)">Information Technology (IT)</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="year">Academic Year</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar input-icon"></i>
                            <select id="year" name="year" required>
                                <option value="" disabled selected>Select Year</option>
                                <option value="First Year">First Year</option>
                                <option value="Second Year">Second Year</option>
                                <option value="Third Year">Third Year</option>
                                <option value="Fourth Year">Fourth Year</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="semester">Current Semester</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-hourglass-half input-icon"></i>
                            <select id="semester" name="semester" required>
                                <option value="" disabled selected>Select Semester</option>
                                <option value="Odd Semester">Odd Semester</option>
                                <option value="Even Semester">Even Semester</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••" 
                            required>
                    </div>
                </div>

                <button type="submit" class="auth-submit-btn">
                    <span>Register</span> <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
